name: Sync Upstream
on:
  schedule:
    - cron: '0 2 * * *'      # 每天 UTC 02:00 自动运行（北京时间 10:00）
  workflow_dispatch:           # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 必须有写权限才能 push

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # 拉取完整历史，merge 需要

      - name: Add upstream and sync
        run: |
          git remote add upstream https://github.com/上游用户名/上游仓库名.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
